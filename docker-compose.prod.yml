# Production-style overrides: no --reload (hot reload is for local dev only).
# Порт хоста задаётся в docker-compose.yml (по умолчанию 80:8000).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  api:
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000
