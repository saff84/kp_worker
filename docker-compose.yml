services:
  db:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parser_kp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parser_kp"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    restart: unless-stopped
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    restart: unless-stopped
    build: .
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      QDRANT_URL: http://qdrant:6333
    ports:
      # Локально оставьте 8000. На VPS с публичным IP для UI на 80 порту замените на "80:8000".
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - ./:/app

  worker:
    restart: unless-stopped
    build: .
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      api:
        condition: service_healthy
    command: >
      sh -c "python -m app.worker"
    volumes:
      - ./:/app

volumes:
  pg_data:
  qdrant_data:
